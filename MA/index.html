<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solu-Dash: Solubility Jump Game</title>
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #gameCanvas {
            border: 5px solid #00F; /* Blue border for a 'chemical' look */
            background-color: #222;
            z-index: 1; 
            box-shadow: 0 0 20px rgba(0, 0, 255, 0.5);
        }

        #gameOverlay {
            position: absolute;
            color: white;
            text-align: center;
            pointer-events: none; /* Allows clicks/key presses to pass to the game */
            z-index: 2; 
        }

        #questionText {
            font-size: 28px;
            color: #4CAF50; /* Green for success/question */
            text-shadow: 1px 1px 3px black;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #scoreText {
            font-size: 20px;
            color: #FFD700; /* Gold for score */
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="gameOverlay">
        <p id="scoreText">Score: 0</p>
        <h2 id="questionText">Press SPACE to Start!</h2>
    </div>

    <script>
        // Get the canvas and its 2D context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const questionDisplay = document.getElementById('questionText');

        // Game constants
        const GRAVITY = 0.8;
        const JUMP_STRENGTH = -15;
        const GAME_SPEED = 4;
        const GROUND_Y = canvas.height - 30;

        // Game state variables
        let isGameRunning = false;
        let score = 0;
        let player = {
            x: 50,
            y: GROUND_Y - 20, 
            width: 20,
            height: 20,
            velocityY: 0,
            isJumping: false
        };
        let obstacles = [];
        let solubilityQuestion = null;
        let answerPathY = null; // The y-coordinate of the correct path to generate
        let questionActive = false; // Flag to pause generation during question phase

        // --- Solubility Question Data ---
        // 'Yes' = Soluble/Precipitate, 'No' = Insoluble/Dissolves
        // pathY: The vertical position (Y coordinate) of the CORRECT path.
        const SOLUBILITY_QUESTIONS = [
            {
                question: "Is $\text{KNO}_3$ soluble in water? (Yes/No)",
                correctAnswer: "Yes",
                pathY: 250 // Lower path
            },
            {
                question: "Is $\text{AgCl}$ soluble in water? (Yes/No)",
                correctAnswer: "No",
                pathY: 150 // Higher path
            },
            {
                question: "Will $\text{BaSO}_4$ precipitate when $\text{BaCl}_2$ and $\text{Na}_2\text{SO}_4$ are mixed?",
                correctAnswer: "Yes", // The $\text{BaSO}_4$ precipitate means Yes
                pathY: 250
            },
            {
                question: "Is $\text{Ca}(\text{OH})_2$ considered soluble (slightly)? (Yes/No)",
                correctAnswer: "Yes",
                pathY: 150
            },
            {
                question: "Will any alkali metal salt precipitate? (Yes/No)",
                correctAnswer: "No", // Alkali metals are always soluble
                pathY: 250
            }
        ];
        // --- End Question Data ---
        
        // --- Core Physics and Drawing ---
        
        function updatePlayer() {
            // Apply gravity
            player.velocityY += GRAVITY;
            player.y += player.velocityY;

            // Check collision with the ground
            if (player.y > GROUND_Y - player.height) {
                player.y = GROUND_Y - player.height;
                player.velocityY = 0;
                player.isJumping = false;
            }
        }

        function draw() {
            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw the ground
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);

            // Draw the player (ion particle)
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw obstacles
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.color; // Use defined color (red for hazard, blue for path)
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });
        }
        
        // --- Obstacle and Collision Logic ---

        function updateObstacles() {
            if (questionActive) return; // Stop movement during question display

            // Move all obstacles to the left
            obstacles.forEach(obs => {
                obs.x -= GAME_SPEED;
            });

            // Remove off-screen obstacles
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);

            // Simple obstacle generation based on the set path
            if (obstacles.length < 50 && answerPathY !== null) {
                // Generate obstacles only on the 'wrong' path to force the player into the correct one
                const wrongPathY = (answerPathY === 250) ? 150 : 250;
                
                // Add spikes to the wrong path
                if (Math.random() < 0.1) {
                    obstacles.push({ 
                        x: canvas.width, 
                        y: wrongPathY, 
                        width: 30, 
                        height: 30, 
                        color: '#F00' // Red Spikes (Insoluble/Wrong)
                    }); 
                }
            }
            
            // Trigger a new question when few obstacles remain
            if (obstacles.length === 0 && answerPathY !== null) {
                 answerPathY = null; // Clear the path
                 loadNewQuestion();
            }
        }

        function checkCollisions() {
            return obstacles.some(obs => 
                player.x < obs.x + obs.width &&
                player.x + player.width > obs.x &&
                player.y < obs.y + obs.height &&
                player.y + player.height > obs.y
            );
        }
        
        // --- Solubility Game Logic ---
        
        function loadNewQuestion() {
            questionActive = true;
            // Pick a random question
            const qIndex = Math.floor(Math.random() * SOLUBILITY_QUESTIONS.length);
            solubilityQuestion = SOLUBILITY_QUESTIONS[qIndex];
            
            // Display the question (Using unicode characters for chemical look)
            questionDisplay.innerHTML = solubilityQuestion.question.replace(/\\text\{(\w+)\}/g, '$1').replace(/_/g, '<sub>').replace(/\^/g, '<sup>') + 
                "<br> (Jump to the high path for 'No', Stay low for 'Yes')";
            
            // Generate the two initial, safe pathways for choice
            generateInitialChoicePaths(SOLUBILITY_QUESTIONS.find(q => q.correctAnswer === 'Yes').pathY, SOLUBILITY_QUESTIONS.find(q => q.correctAnswer === 'No').pathY);
        }

        function generateInitialChoicePaths(yYes, yNo) {
            obstacles = []; // Clear existing for the new setup

            // Obstacles that create the two distinct, safe paths for choosing.
            // These should NOT cause collisions if the player is on them.
            
            // Path for 'No' (Insoluble/Precipitate): Higher Y (150)
            obstacles.push({ x: canvas.width, y: yNo - 10, width: 200, height: 10, color: '#39F' }); 
            // Path for 'Yes' (Soluble/Dissolves): Lower Y (250)
            obstacles.push({ x: canvas.width, y: yYes - 10, width: 200, height: 10, color: '#39F' }); 
        }
        
        function checkAnswer() {
            if (!solubilityQuestion) return;

            // Determine if the player is closer to the 'Yes' path or the 'No' path
            const yYes = SOLUBILITY_QUESTIONS.find(q => q.correctAnswer === 'Yes').pathY;
            const yNo = SOLUBILITY_QUESTIONS.find(q => q.correctAnswer === 'No').pathY;

            // Player's center Y coordinate
            const playerCenterY = player.y + (player.height / 2);

            let chosenAnswer;
            // Simplified check: If player is higher than the midpoint, they chose 'No'
            if (playerCenterY < (yYes + yNo) / 2) {
                 chosenAnswer = (yNo === solubilityQuestion.pathY) ? "No" : "Yes";
            } else {
                 chosenAnswer = (yYes === solubilityQuestion.pathY) ? "Yes" : "No";
            }
            
            // Set the path to follow based on the answer
            if (chosenAnswer === solubilityQuestion.correctAnswer) {
                questionDisplay.innerHTML = `CORRECT! Navigating the ${chosenAnswer} path...`;
                answerPathY = solubilityQuestion.pathY;
            } else {
                // If they chose the wrong path, they hit the instant death spikes that are generated on the wrong path!
                questionDisplay.innerHTML = `INCORRECT! Game Over. Press SPACE to Restart. (Correct: ${solubilityQuestion.correctAnswer})`;
                isGameRunning = false;
                return;
            }

            questionActive = false; // Resume game movement
            solubilityQuestion = null;
        }

        // --- Game Flow Control ---

        function startGame() {
            isGameRunning = true;
            score = 0;
            player.y = GROUND_Y - player.height;
            player.velocityY = 0;
            player.isJumping = false;
            questionActive = false;
            answerPathY = null;
            obstacles = [];
            
            // Start with the first question
            loadNewQuestion();
        }

        function gameLoop() {
            if (!isGameRunning) {
                requestAnimationFrame(gameLoop);
                return;
            }

            // 1. Update Logic
            if (!questionActive) {
                updatePlayer();
                updateObstacles();
            }

            // 2. Collision Check (Only when actively moving)
            if (!questionActive && checkCollisions()) {
                questionDisplay.innerHTML = "CRASH! Game Over. Press SPACE to Restart.";
                isGameRunning = false;
            }
            
            // 3. Drawing (Rendering)
            draw();

            // 4. Score Update (Only update when actively playing the level)
            if (answerPathY !== null) {
                score++;
                document.getElementById('scoreText').textContent = `Score: ${Math.floor(score / 10)}`;
            }


            // Loop the game
            requestAnimationFrame(gameLoop);
        }

        // --- Input Handler ---

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (!isGameRunning) {
                    startGame();
                } else if (!player.isJumping && !questionActive) {
                    // Standard Jump
                    player.velocityY = JUMP_STRENGTH;
                    player.isJumping = true;
                } else if (questionActive && !player.isJumping) {
                    // Trigger Answer Check when on a path and not mid-air
                    player.velocityY = JUMP_STRENGTH; // Jump to select the path
                    player.isJumping = true;
                    // Check answer after a brief moment or at end of choice section
                    setTimeout(checkAnswer, 300); // Give player time to move up
                }
            }
        });

        // Start the game loop immediately to draw the initial state
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
